name: Vicuna CI

on:
  workflow_dispatch:
  push:
  pull_request:
  schedule:
    - cron: "27 5 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CMAKE_GENERATOR: Ninja
  CTEST_OUTPUT_ON_FAILURE: 1
  GGML_NLOOP: 3
  GGML_N_THREADS: 1
  LLAMA_LOG_COLORS: 1
  LLAMA_LOG_PREFIX: 1
  LLAMA_LOG_TIMESTAMPS: 1

jobs:
  lint-type-quality:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-format \
            ninja-build

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            ./gguf-py \
            -r requirements/requirements-all.txt \
            flake8==4.0.1 \
            flake8-no-print==0.1.1 \
            lizard \
            pre-commit \
            pyright

      - name: Determine diff base
        id: diff-base
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="${{ github.event.before }}"
          else
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          echo "base_sha=${base_sha}" >> "${GITHUB_OUTPUT}"

      - name: Collect changed files
        shell: bash
        run: |
          set -euo pipefail

          git diff --name-only --diff-filter=ACMR \
            "${{ steps.diff-base.outputs.base_sha }}" \
            "${GITHUB_SHA}" > ci-changed-files.txt

          grep -E '\.(c|cc|cpp|cxx|h|hh|hpp|m|mm|cu|cuh)$' ci-changed-files.txt \
            | grep -Ev '^(vendor/|build[^/]*/)' > ci-changed-cxx-files.txt || true

          grep -E '\.(c|cc|cpp|cxx|h|hh|hpp|py|js|mjs)$' ci-changed-files.txt \
            | grep -Ev '^(vendor/|build[^/]*/)' > ci-changed-complexity-files.txt || true

      - name: Run pre-commit checks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run flake8
        run: flake8 .

      - name: Run Pyright
        run: pyright --warnings

      - name: Run clang-format on changed native sources
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s ci-changed-cxx-files.txt ]]; then
            echo "No changed native source files to format-check."
            exit 0
          fi

          xargs -r clang-format --dry-run --Werror < ci-changed-cxx-files.txt

      - name: Run complexity guard on changed files
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s ci-changed-complexity-files.txt ]]; then
            echo "No changed files eligible for complexity analysis."
            exit 0
          fi

          xargs -r lizard -C 100 -L 500 < ci-changed-complexity-files.txt

  build-and-test-gcc:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up ccache
        uses: ggml-org/ccache-action@v1.2.16
        with:
          key: vicuna-ci-gcc
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            git-lfs \
            libssl-dev \
            ninja-build

          git lfs install

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./gguf-py

      - name: Configure GCC build
        run: |
          cmake -S . -B build-gcc \
            -G "${CMAKE_GENERATOR}" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DLLAMA_FATAL_WARNINGS=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON

      - name: Build with GCC
        run: cmake --build build-gcc --parallel

      - name: Run GCC test suite
        run: |
          ctest --test-dir build-gcc \
            -L main \
            -E "test-llama-archs" \
            --timeout 900 \
            --output-junit build-gcc/ctest-gcc.xml

      - name: Upload GCC test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcc-test-reports
          path: |
            build-gcc/ctest-gcc.xml
            build-gcc/Testing/Temporary/**

  build-and-test-clang-sanitizers:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-24.04

    env:
      ASAN_OPTIONS: detect_leaks=1:check_initialization_order=1:strict_string_checks=1:detect_stack_use_after_return=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up ccache
        uses: ggml-org/ccache-action@v1.2.16
        with:
          key: vicuna-ci-clang-sanitizers
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ccache \
            clang \
            lld \
            libssl-dev \
            ninja-build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./gguf-py

      - name: Configure Clang sanitizer build
        run: |
          cmake -S . -B build-asan \
            -G "${CMAKE_GENERATOR}" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DLLAMA_FATAL_WARNINGS=ON \
            -DLLAMA_SANITIZE_ADDRESS=ON \
            -DLLAMA_SANITIZE_UNDEFINED=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON

      - name: Build with Clang sanitizers
        run: cmake --build build-asan --parallel

      - name: Run sanitizer test suite
        run: |
          ctest --test-dir build-asan \
            -L main \
            -E "test-llama-archs" \
            --timeout 900 \
            --output-junit build-asan/ctest-asan.xml

      - name: Upload sanitizer test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-sanitizer-test-reports
          path: |
            build-asan/ctest-asan.xml
            build-asan/Testing/Temporary/**

  clang-tidy:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            clang-tidy \
            libssl-dev \
            ninja-build

      - name: Determine diff base
        id: diff-base
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="${{ github.event.before }}"
          else
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          echo "base_sha=${base_sha}" >> "${GITHUB_OUTPUT}"

      - name: Collect changed native files
        shell: bash
        run: |
          set -euo pipefail

          git diff --name-only --diff-filter=ACMR \
            "${{ steps.diff-base.outputs.base_sha }}" \
            "${GITHUB_SHA}" > ci-changed-files.txt

          grep -E '\.(c|cc|cpp|cxx)$' ci-changed-files.txt \
            | grep -Ev '^(vendor/|build[^/]*/)' > ci-changed-tidy-sources.txt || true

          grep -E '\.(h|hh|hpp)$' ci-changed-files.txt \
            | grep -Ev '^(vendor/|build[^/]*/)' > ci-changed-tidy-headers.txt || true

      - name: Configure clang-tidy build
        run: |
          cmake -S . -B build-clang-tidy \
            -G "${CMAKE_GENERATOR}" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DLLAMA_FATAL_WARNINGS=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON \
            "-DCMAKE_C_CLANG_TIDY=clang-tidy;--warnings-as-errors=*;--header-filter=^(src|include|common|ggml/(src|include)|tools|examples|tests)/" \
            "-DCMAKE_CXX_CLANG_TIDY=clang-tidy;--warnings-as-errors=*;--header-filter=^(src|include|common|ggml/(src|include)|tools|examples|tests)/"

      - name: Run clang-tidy on changed sources
        shell: bash
        run: |
          set -euo pipefail

          if [[ -s ci-changed-tidy-sources.txt ]]; then
            while IFS= read -r file; do
              clang-tidy \
                -p build-clang-tidy \
                --quiet \
                --warnings-as-errors='*' \
                --header-filter='^(src|include|common|ggml/(src|include)|tools|examples|tests)/' \
                "${file}"
            done < ci-changed-tidy-sources.txt
            exit 0
          fi

          if [[ -s ci-changed-tidy-headers.txt ]]; then
            echo "Header-only native change detected; running full compile with clang-tidy enabled."
            cmake --build build-clang-tidy --parallel 2
            exit 0
          fi

          echo "No changed native files require clang-tidy analysis."

  valgrind:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            ninja-build \
            valgrind

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./gguf-py

      - name: Configure Valgrind build
        run: |
          cmake -S . -B build-valgrind \
            -G "${CMAKE_GENERATOR}" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DLLAMA_FATAL_WARNINGS=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON

      - name: Build Valgrind smoke targets
        run: |
          cmake --build build-valgrind --parallel --target \
            test-alloc \
            test-arg-parser \
            test-chat-auto-parser \
            test-chat-peg-parser \
            test-chat-template \
            test-gguf \
            test-grammar-integration \
            test-grammar-parser \
            test-jinja \
            test-json-partial \
            test-llama-grammar \
            test-log \
            test-mtmd-c-api \
            test-regex-partial \
            test-sampling

      - name: Run Valgrind smoke tests
        run: ./ci/run-valgrind-smoke.sh build-valgrind

      - name: Upload Valgrind logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-logs
          path: build-valgrind/valgrind-logs/**

  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, python]

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Set up Python environment
        if: ${{ matrix.language == 'c-cpp' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CodeQL build dependencies
        if: ${{ matrix.language == 'c-cpp' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            ninja-build

      - name: Install Python build dependencies
        if: ${{ matrix.language == 'c-cpp' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./gguf-py

      - name: Build for CodeQL
        if: ${{ matrix.language == 'c-cpp' }}
        run: |
          cmake -S . -B build-codeql \
            -G "${CMAKE_GENERATOR}" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON
          cmake --build build-codeql --parallel

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  snyk:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-24.04
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Check out source repository
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: actions/checkout@v6

      - name: Set up Python environment
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependency manifests
        if: ${{ env.SNYK_TOKEN != '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./gguf-py -r requirements/requirements-all.txt

      - name: Set up Snyk CLI
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@v1

      - name: Run Snyk dependency scan
        if: ${{ env.SNYK_TOKEN != '' }}
        run: snyk test --all-projects --severity-threshold=high --fail-on=all

      - name: Skip Snyk scan when token is unavailable
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN is not configured; skipping dependency scan."
